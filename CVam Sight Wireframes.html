<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVam Sight — Wireframes</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { background: #e6dcc4; }
  /* override design canvas chrome to feel sketchy */
  .dc-section-title, .dc-artboard-label { font-family: 'Caveat', cursive !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="home-variations-1.jsx"></script>
<script type="text/babel" src="home-variations-2.jsx"></script>
<script type="text/babel" src="support-screens.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "yellow_intensity": 15,
    "font_pairing": "kalam_caveat"
  }/*EDITMODE-END*/;

  const FONT_PAIRINGS = {
    kalam_caveat:        { display: 'Caveat',              body: 'Kalam',                mono: 'JetBrains Mono', label: 'Caveat × Kalam (default)' },
    architects_caveat:   { display: 'Caveat',              body: 'Architects Daughter',  mono: 'JetBrains Mono', label: 'Caveat × Architects' },
    fraunces_plex:       { display: 'Fraunces',            body: 'IBM Plex Sans',        mono: 'IBM Plex Mono',  label: 'Fraunces × Plex (mid-fi)' },
    plex_only:           { display: 'IBM Plex Sans',       body: 'IBM Plex Sans',        mono: 'IBM Plex Mono',  label: 'IBM Plex (clean)' },
    inter_jet:           { display: 'Inter',               body: 'Inter',                mono: 'JetBrains Mono', label: 'Inter × JetBrains' },
  };

  function applyTweaks(t) {
    const root = document.documentElement;
    // yellow intensity → adjust chroma + lightness on the accent
    const i = (t.yellow_intensity ?? 65) / 100;          // 0..1
    // map: low intensity = pale cream, high = punchy gold
    const l = 0.78 + (1 - i) * 0.10;                      // 0.78 → 0.88
    const c = 0.05 + i * 0.16;                            // 0.05 → 0.21
    const lDeep = 0.66 + (1 - i) * 0.05;
    const cDeep = 0.08 + i * 0.18;
    root.style.setProperty('--yellow', `oklch(${l} ${c} 86)`);
    root.style.setProperty('--yellow-soft', `oklch(${Math.min(0.92, l + 0.07)} ${c * 0.7} 86)`);
    root.style.setProperty('--yellow-deep', `oklch(${lDeep} ${cDeep} 76)`);

    const f = FONT_PAIRINGS[t.font_pairing] || FONT_PAIRINGS.kalam_caveat;
    root.style.setProperty('--hand-display', `'${f.display}', cursive`);
    root.style.setProperty('--hand-body', `'${f.body}', cursive`);
    root.style.setProperty('--hand', `'${f.body}', cursive`);
    root.style.setProperty('--hand-mono', `'${f.mono}', monospace`);
  }

  // Boot — wait for all components to register
  function boot() {
    if (!window.DesignCanvas || !window.TweaksPanel || !window.HomeEditorial ||
        !window.HomeIndex || !window.HomeTerminal || !window.HomeNewsprint ||
        !window.CategoryArchive || !window.ResourcesPage || !window.TagsPage ||
        !window.SearchPage || !window.SinglePost) {
      return setTimeout(boot, 50);
    }

    const { DesignCanvas, DCSection, DCArtboard } = window;
    const { TweaksPanel, useTweaks, TweakSection, TweakSlider, TweakSelect } = window;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

      return (
        <>
          <DesignCanvas title="cvam.sight — wireframe explorations" subtitle="low-fi · paper + yellow · 4 home directions + 5 supporting screens">
            <DCSection id="home" title="Homepage — 4 directions">
              <DCArtboard id="home-editorial"  label="01 · Editorial — featured hero, big type, 3-up feed"  width={1200} height={1500}>
                <window.HomeEditorial />
              </DCArtboard>
              <DCArtboard id="home-index"      label="02 · Index — sidebar + dense numbered log"           width={1200} height={1500}>
                <window.HomeIndex />
              </DCArtboard>
              <DCArtboard id="home-terminal"   label="03 · Terminal — code-forward intro + categories"     width={1200} height={1500}>
                <window.HomeTerminal />
              </DCArtboard>
              <DCArtboard id="home-newsprint"  label="04 · Newsprint — broadsheet masthead + 3 columns"    width={1200} height={1500}>
                <window.HomeNewsprint />
              </DCArtboard>
            </DCSection>

            <DCSection id="supporting" title="Supporting screens">
              <DCArtboard id="archive"   label="Category / Archive — ml" width={1200} height={1400}>
                <window.CategoryArchive />
              </DCArtboard>
              <DCArtboard id="resources" label="Resources / Links"        width={1200} height={1300}>
                <window.ResourcesPage />
              </DCArtboard>
              <DCArtboard id="tags"      label="Tags — weighted cloud"    width={1200} height={1100}>
                <window.TagsPage />
              </DCArtboard>
              <DCArtboard id="search"    label="Search — ⌘K overlay"      width={1200} height={1000}>
                <window.SearchPage />
              </DCArtboard>
              <DCArtboard id="post"      label="Single post — TOC + margin notes" width={1200} height={1700}>
                <window.SinglePost />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Accent">
              <TweakSlider
                label="Yellow intensity"
                hint="pale cream → punchy gold"
                value={tweaks.yellow_intensity}
                min={0} max={100} step={5}
                onChange={v => setTweak('yellow_intensity', v)}
              />
            </TweakSection>
            <TweakSection title="Type">
              <TweakSelect
                label="Font pairing"
                value={tweaks.font_pairing}
                options={Object.entries(FONT_PAIRINGS).map(([v, f]) => ({ value: v, label: f.label }))}
                onChange={v => setTweak('font_pairing', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }
  boot();
</script>
</body>
</html>
